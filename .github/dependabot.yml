# =============================================================================
# Dependabot — PRs automáticos de atualização de dependências.
# Vai em .github/dependabot.yml (NÃO é um workflow).
# =============================================================================
version: 2
updates:
  # Dependências Python (lê pyproject.toml + uv.lock)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "build"   # alinhado a Conventional Commits

  # Versões das GitHub Actions usadas nos workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
