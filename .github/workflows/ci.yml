# =============================================================================
# CI — qualidade de código: lint, type check, segurança, complexidade,
# código morto e cobertura de docstrings.
# Roda em todo push/PR e semanalmente (re-scan de segurança das dependências).
# Estas checagens independem do SO, então rodam em um único ubuntu.
# =============================================================================
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # toda segunda 06:00 UTC

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    name: Type Check (basedPyright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run basedpyright

  security:
    name: Security (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run bandit -r src -c pyproject.toml
      - run: uv run pip-audit

  quality:
    name: Dead code, complexity & docstrings
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
          python-version: "3.12"
      - run: uv sync --dev
      - run: uv run vulture src
      - run: uv run refurb src
      - run: uv run xenon --max-absolute B --max-modules A --max-average A src
      - run: uv run interrogate -v src
